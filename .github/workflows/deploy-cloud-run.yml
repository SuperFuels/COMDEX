name: Build & Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Check out your code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2) Authenticate to GCP using your service account key
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 3) Install gcloud SDK
      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          install_components: 'beta'

      # 4) Configure Docker for pushing to GCR
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # 5) Build your Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT }}/comdex-api:${{ github.sha }} \
            -f backend/Dockerfile \
            .

      # 6) Push to Google Container Registry
      - name: Push to Container Registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/comdex-api:${{ github.sha }}

      # 7) Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy comdex-api \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/comdex-api:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "WEB3_PROVIDER_URL=${{ secrets.WEB3_PROVIDER_URL }}","ESCROW_CONTRACT_ADDRESS=${{ secrets.ESCROW_CONTRACT_ADDRESS }}","DEPLOYER_PRIVATE_KEY=${{ secrets.DEPLOYER_PRIVATE_KEY }}","OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}","CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}"
