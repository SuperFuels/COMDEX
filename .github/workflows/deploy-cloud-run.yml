name: Build & Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT }}/comdex-api:${{ github.sha }} \
            -f backend/Dockerfile \
            .

      - name: Push to Container Registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/comdex-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy comdex-api \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/comdex-api:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars \
WEB3_PROVIDER_URL=${{ secrets.WEB3_PROVIDER_URL }},\
ESCROW_CONTRACT_ADDRESS=${{ secrets.ESCROW_CONTRACT_ADDRESS }},\
DEPLOYER_PRIVATE_KEY=${{ secrets.DEPLOYER_PRIVATE_KEY }},\
OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},\
CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
