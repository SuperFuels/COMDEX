# A generic, single database configuration.

[alembic]
# path to migration scripts, relative to this ini file
script_location = alembic

# prepend your project root onto sys.path so env.py can import your models
prepend_sys_path = .

# path_separator allows multiple paths if you ever need them
path_separator = os

# your real database URL goes here:
# using Cloud SQL proxy via UNIX socket:
sqlalchemy.url = postgresql+psycopg2://comdex:Wn8smx123@/comdex?host=/cloudsql/swift-area-459514-d1:us-central1:comdex-db

[post_write_hooks]
# (optional) run black or ruff on newly generated revisions
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S