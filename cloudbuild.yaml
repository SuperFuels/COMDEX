steps:
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - -t
    - gcr.io/$PROJECT_ID/comdex-api:$COMMIT_SHA
    - .
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - gcr.io/$PROJECT_ID/comdex-api:$COMMIT_SHA
- name: gcr.io/cloud-builders/gcloud
  entrypoint: bash
  args:
    - -c
    - |
      gcloud run deploy comdex-api \
        --image gcr.io/$PROJECT_ID/comdex-api:$COMMIT_SHA \
        --region us-central1 \
        --platform managed \
        --allow-unauthenticated \
        --set-env-vars \
WEB3_PROVIDER_URL="\${_WEB3_PROVIDER_URL}",\
ESCROW_CONTRACT_ADDRESS="\${_ESCROW_CONTRACT_ADDRESS}",\
DEPLOYER_PRIVATE_KEY="\${_DEPLOYER_PRIVATE_KEY}",\
OPENAI_API_KEY="\$OPENAI_API_KEY",\
CORS_ALLOWED_ORIGINS="\${_CORS_ALLOWED_ORIGINS}"
substitutions:
  _WEB3_PROVIDER_URL: "https://polygon-amoy.g.alchemy.com/v2/2iHliTT_b-chEgTBquOv_HRRVnKbKrow"
  _ESCROW_CONTRACT_ADDRESS: "0xe7f1725e7734ce288f8367e1bb143e90bb3f0512"
  _DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
  _CORS_ALLOWED_ORIGINS: "https://comdex-frontend-375760843948.us-central1.run.app"
secrets:
- secretEnv:
    OPENAI_API_KEY: "projects/$PROJECT_ID/secrets/OPENAI_API_KEY/versions/latest"
timeout: "1200s"
