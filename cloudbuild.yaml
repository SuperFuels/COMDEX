# cloudbuild.yaml

substitutions:
  _SERVICE: comdex-api
  _REGION: us-central1

steps:
  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 1: Build & export the frontend into "frontend/out"
  # ─────────────────────────────────────────────────────────────────────────────

  # 1a) Install frontend dependencies (inside frontend/)
  - name: 'gcr.io/cloud-builders/npm'
    id: 'frontend-npm-install'
    dir: 'frontend'
    args: ['ci']

  # 1b) Build the Next.js app (generates .next/)
  - name: 'gcr.io/cloud-builders/npm'
    id: 'frontend-build'
    dir: 'frontend'
    args: ['run', 'build']

  # 1c) Export the Next.js site to static HTML in frontend/out/
  - name: 'gcr.io/cloud-builders/npm'
    id: 'frontend-export'
    dir: 'frontend'
    args: ['run', 'export']

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2: Build and push the backend Docker image
  #         (which must include the prebuilt frontend/out/)
  # ─────────────────────────────────────────────────────────────────────────────

  # 2a) Build the Docker image (no-cache) and tag with both $BUILD_ID and :latest.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      [
        'build',
        '--no-cache',
        '-f', 'Dockerfile',
        '-t', 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID',
        '-t', 'gcr.io/$PROJECT_ID/${_SERVICE}:latest',
        '.'
      ]

  # 2b) Push the "$BUILD_ID" tag
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push-buildid'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID'
      ]

  # 2c) Push the ":latest" tag
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push-latest'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/${_SERVICE}:latest'
      ]

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 3: Deploy the newly pushed image to Cloud Run
  # ─────────────────────────────────────────────────────────────────────────────

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      [
        'run', 'deploy', '${_SERVICE}',
        '--image', 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID',
        '--region', '$_REGION',
        '--platform', 'managed',
        '--allow-unauthenticated',
        '--add-cloudsql-instances=swift-area-459514-d1:us-central1:comdex-db',
        '--vpc-connector=comdex-connector',
        '--vpc-egress=private-ranges-only',
        '--env-vars-file=cloudrun-env.yaml',
        '--timeout=300s',
        '--port=8080'
      ]

# Tell Cloud Build which images were produced
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/${_SERVICE}:latest'